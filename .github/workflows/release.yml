name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build portable release (zip)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }
          powershell -ExecutionPolicy Bypass -File scripts\make_release.ps1 -Name ("WeChatDataService_Windows_{0}" -f $ver)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.sha256.txt

